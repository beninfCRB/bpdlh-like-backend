apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpdlh-like-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bpdlh-like-backend
  template:
    metadata:
      labels:
        app: bpdlh-like-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/beninfcrb/bpdlh-like-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: TELESCOPE_ENABLED
              value: "false"
            - name: CACHE_DRIVER
              value: "file"
            - name: SESSION_DRIVER
              value: "file"
          envFrom:
            - secretRef:
                name: bpdlh-app-env
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
