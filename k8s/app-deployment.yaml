apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpdlh-like-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bpdlh-like-backend
  template:
    metadata:
      labels:
        app: bpdlh-like-backend
    spec:
      containers:
        - name: app
          image: ghcr.io/beninfCRB/bpdlh-like-backend:latest
          imagePullPolicy: Always
          command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: APP_KEY
            - name: DB_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: DB_CONNECTION
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bpdlh-app-env
                  key: DB_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
