name: CD ArgoCD

on:
  workflow_dispatch:
  push:
    branches: [main, dev]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check prerequisites
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          if [ -z "$ARGOCD_SERVER" ]; then
            echo "⚠️ ARGOCD_SERVER not configured, skipping CD sync"
            exit 0
          fi
          echo "✅ ARGOCD_SERVER configured: $ARGOCD_SERVER"

      - name: Install ArgoCD CLI
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          if [ -z "$ARGOCD_SERVER" ]; then exit 0; fi
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Sync application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_APP_NAME_MAIN: bpdlh-like-backend-main
          ARGOCD_APP_NAME_DEV: bpdlh-like-backend-dev
        run: |
          if [ -z "$ARGOCD_SERVER" ]; then exit 0; fi

          if [ "$GITHUB_REF_NAME" = "main" ]; then
            ARGOCD_APP_NAME="$ARGOCD_APP_NAME_MAIN"
          elif [ "$GITHUB_REF_NAME" = "dev" ]; then
            ARGOCD_APP_NAME="$ARGOCD_APP_NAME_DEV"
          else
            echo "Branch $GITHUB_REF_NAME is not mapped to ArgoCD app" >&2
            exit 1
          fi

          argocd app sync "$ARGOCD_APP_NAME" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --insecure
          argocd app wait "$ARGOCD_APP_NAME" \
            --server "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --insecure \
            --health
